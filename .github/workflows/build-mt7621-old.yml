# OpenWrt CUPS Package Build
# 从 downloads.openwrt.org 下载 SDK，产出 .ipk（opkg 格式，适配 21.02.x 21.03.x-23.05.x）
name: Build CUPS for OpenWrt—MT7621-old

on:
  #push:
    #branches: [main, master]
  pull_request:
    #branches: [main, master]
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: true
        default: 'false'

env:
  OPENWRT_VERSION: "19.07.0"

jobs:
  build:
    name: ${{ matrix.target }}/${{ matrix.subtarget }} build
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: mipsel_24kc
            target: ramips
            subtarget: mt7621
            
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download and extract SDK
        id: sdk
        env: 
          TARGET: ${{ matrix.target }}
          SUBTARGET: ${{ matrix.subtarget }}
        run: |
          BASE_URL="https://downloads.openwrt.org/releases/${OPENWRT_VERSION}/targets"
          TARGET_PATH="${TARGET}/${SUBTARGET}"
          INDEX=$(curl -sL "${BASE_URL}/${TARGET_PATH}/")
          SDK_FILE=$(echo "$INDEX" | grep -oE "openwrt-sdk-${OPENWRT_VERSION}-${TARGET}-${SUBTARGET}_[^\"]+\.tar\.xz" | head -1)
          [ -n "$SDK_FILE" ] || { echo "ERROR: Could not find SDK for ${TARGET_PATH}"; exit 1; }
          curl -sL -o sdk.tar.xz "${BASE_URL}/${TARGET_PATH}/${SDK_FILE}"
          tar -Jxvf sdk.tar.xz
          rm sdk.tar.xz
          SDK_DIR=$(find . -maxdepth 1 -type d -name "openwrt-sdk-*" | head -1)
          echo "dir=${SDK_DIR}" >> $GITHUB_OUTPUT
          echo "SDK_DIR=${SDK_DIR}" >> $GITHUB_ENV

      - name: Configure feed
        run: |
          FEED_DIR="https://github.com/marchmin/lede-cups/"
          cd ${{ steps.sdk.outputs.dir }}
          [ -f feeds.conf ] || cp feeds.conf.default feeds.conf
          echo "src-git printing $FEED_DIR" >> feeds.conf
          ./scripts/feeds update -a
          ./scripts/feeds install -p printing -f cups
          make defconfig 2>/dev/null || true
          
      - name: SSH connection to Actions
        uses: P3TERX/ssh2actions@v1.0.0
        if: (github.event.inputs.ssh == 'true' && github.event.inputs.ssh  != 'false') || contains(github.event.action, 'ssh')
        env:
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

      - name: Build CUPS packages
        run: |
          cd ${{ steps.sdk.outputs.dir }}
          make package/cups/compile -j$(nproc) V=s

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: cups-${OPENWRT_VERSION}-${{ matrix.arch }}-packages
          path: openwrt-sdk-*/bin/**/cups*.ipk
          if-no-files-found: warn

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cups-${OPENWRT_VERSION}-${{ matrix.arch }}-logs
          path: openwrt-sdk-*/logs/
          if-no-files-found: ignore

  release:
    name: Publish CUPS OpenWrt packages
    needs: build
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      contains(github.event.head_commit.message, 'chore: bump CUPS to')
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read PKG_VERSION from Makefile
        id: version
        run: |
          MAKEFILE="packages/print/cups/Makefile"
          PKG_VERSION=$(grep -E '^PKG_VERSION:=' "$MAKEFILE" | cut -d= -f2)
          echo "PKG_VERSION=${PKG_VERSION}" >> $GITHUB_ENV
          echo "pkg_version=${PKG_VERSION}" >> $GITHUB_OUTPUT

      - name: Download built packages
        uses: actions/download-artifact@v4
        with:
          pattern: cups-*-packages
          merge-multiple: true
          path: dist

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          # 单个 Release，表示「某个 CUPS 版本在某个 OpenWrt 版本上的全部矩阵构建产物」
          tag_name: v${{ steps.version.outputs.pkg_version }}-openwrt-${{ env.OPENWRT_VERSION }}
          name: CUPS ${{ steps.version.outputs.pkg_version }} packages for OpenWrt ${{ env.OPENWRT_VERSION }}
          draft: false
          prerelease: false
          files: |
            dist/**/*.ipk
